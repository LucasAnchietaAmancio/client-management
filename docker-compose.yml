services:
  postgres:
    image: postgres:16-alpine
    container_name: db-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_PORT: ${POSTGRES_PORT}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PIPEFY_MODE: ${PIPEFY_MODE}
      PIPEFY_API_URL: ${PIPEFY_API_URL}
      PIPEFY_CLIENT_MANAGEMENT_PIPE_ID: ${PIPEFY_CLIENT_MANAGEMENT_PIPE_ID}
      PIPEFY_TOKEN: ${PIPEFY_TOKEN}
    command: sh -c "python -m prisma generate && python -m prisma db push && uvicorn main:app --host 0.0.0.0 --port 8000"

volumes:
  postgres_data:
